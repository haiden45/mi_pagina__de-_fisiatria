<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página</title>
    <style>
        body {
            font-family: 'Lora', serif;
            margin: 0;
            padding: 0;
            background-color: #fdf6e3;
            color: #333;
        }
        header {
            background-color: #6d4c41;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 24px;
        }
        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
        }
        .about {
            text-align: center;
            margin-top: 20px;
        }
        .about img {
            width: 150px;
            border-radius: 50%;
        }
        .projects {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 250px;
            text-align: center;
        }
        footer {
            background-color: #6d4c41;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>Mi Página Personal</header>
    <div class="container">
        <section class="about">
            <img src="{{ url_for('static', filename='img/perfil.jpg') }}" alt="Foto de perfil">

            <h2>Sobre mí</h2>
            <p>Bienvenido a mi página. Aquí comparto mis proyectos y pasiones.</p>
        </section>
        <section class="projects">
            <div class="card">
                <h3>Proyecto 1</h3>
                <p>Descripción breve del proyecto.</p>
            </div>
            <div class="card">
                <h3>Proyecto 2</h3>
                <p>Otra descripción breve.</p>
            </div>
        </section>
    </div>
    <footer>Contacto | Redes Sociales</footer>
</body>
</html>
